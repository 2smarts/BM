<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2SMART PVT LIMITED - Web App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f5f5f5; }
    header { background:#007bff; color:white; padding:15px; text-align:center; }
    nav { display:flex; justify-content:space-around; background:#eee; padding:10px; }
    nav button { padding:10px 20px; border:none; border-radius:5px; cursor:pointer; }
    section { padding:20px; display:none; }
    section.active { display:block; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th, td { border:1px solid #ccc; padding:8px; text-align:center; }
    th { background:#007bff; color:white; }
    .btn { background:#007bff; color:white; padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>

<header>
  <h1>2SMART PVT LIMITED</h1>
  <p>Business Management System</p>
</header>

<nav>
  <button onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('invoice')">Invoice</button>
  <button onclick="showSection('voucher')">Voucher</button>
  <button onclick="showSection('accounts')">Accounts</button>
  <button onclick="showSection('reports')">Reports</button>
</nav>

<!-- Dashboard -->
<section id="dashboard" class="active">
  <h2>Dashboard</h2>
  <div class="card">Welcome to your business management system. Use the navigation above.</div>
</section>

<!-- Invoice -->
<section id="invoice">
  <h2>Invoice</h2>
  <form onsubmit="saveInvoice(event)">
    <input type="text" id="invoiceNo" placeholder="Invoice No" required><br><br>
    <input type="date" id="invoiceDate" required><br><br>
    <input type="text" id="partyName" placeholder="Party Name" required><br><br>
    <input type="number" id="amount" placeholder="Amount" required><br><br>
    <button class="btn" type="submit">Save Invoice</button>
  </form>
  <h3>Saved Invoices</h3>
  <div id="invoiceList"></div>
</section>

<!-- Voucher -->
<section id="voucher">
  <h2>Voucher</h2>
  <form onsubmit="saveVoucher(event)">
    <input type="text" id="voucherNo" placeholder="Voucher No" required><br><br>
    <input type="date" id="voucherDate" required><br><br>
    <input type="text" id="voucherAccount" placeholder="Account" required><br><br>
    <input type="number" id="voucherAmount" placeholder="Amount" required><br><br>
    <input type="text" id="voucherNarration" placeholder="Narration"><br><br>
    <button class="btn" type="submit">Save Voucher</button>
  </form>
  <h3>Saved Vouchers</h3>
  <div id="voucherList"></div>
</section>

<!-- Accounts -->
<section id="accounts">
  <h2>Accounts</h2>
  <form onsubmit="saveAccount(event)">
    <input type="text" id="accountName" placeholder="Account Name" required><br><br>
    <select id="accountType">
      <option>Receivable</option>
      <option>Payable</option>
      <option>Cash</option>
      <option>Bank</option>
      <option>Expense</option>
    </select><br><br>
    <button class="btn" type="submit">Save Account</button>
  </form>
  <h3>Saved Accounts</h3>
  <div id="accountList"></div>
</section>

<!-- Reports -->
<section id="reports">
  <h2>Reports</h2>
  <div class="card">Reports will show ledger balances and transactions here.</div>
</section>

<script>
  function showSection(id) {
    document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // LocalStorage helpers
  function getData(key) { return JSON.parse(localStorage.getItem(key) || "[]"); }
  function setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

  // Invoice
  function saveInvoice(e) {
    e.preventDefault();
    const invoices = getData("invoices");
    invoices.push({
      no: document.getElementById("invoiceNo").value,
      date: document.getElementById("invoiceDate").value,
      party: document.getElementById("partyName").value,
      amount: document.getElementById("amount").value
    });
    setData("invoices", invoices);
    renderInvoices();
    e.target.reset();
  }
  function renderInvoices() {
    const invoices = getData("invoices");
    document.getElementById("invoiceList").innerHTML = invoices.map(i =>
      `<div class="card">${i.no} | ${i.date} | ${i.party} | HKD ${i.amount}</div>`
    ).join("");
  }

  // Voucher
  function saveVoucher(e) {
    e.preventDefault();
    const vouchers = getData("vouchers");
    vouchers.push({
      no: document.getElementById("voucherNo").value,
      date: document.getElementById("voucherDate").value,
      account: document.getElementById("voucherAccount").value,
      amount: document.getElementById("voucherAmount").value,
      narration: document.getElementById("voucherNarration").value
    });
    setData("vouchers", vouchers);
    renderVouchers();
    e.target.reset();
  }
  function renderVouchers() {
    const vouchers = getData("vouchers");
    document.getElementById("voucherList").innerHTML = vouchers.map(v =>
      `<div class="card">${v.no} | ${v.date} | ${v.account} | HKD ${v.amount} | ${v.narration}</div>`
    ).join("");
  }

  // Accounts
  function saveAccount(e) {
    e.preventDefault();
    const accounts = getData("accounts");
    accounts.push({
      name: document.getElementById("accountName").value,
      type: document.getElementById("accountType").value
    });
    setData("accounts", accounts);
    renderAccounts();
    e.target.reset();
  }
  function renderAccounts() {
    const accounts = getData("accounts");
    document.getElementById("accountList").innerHTML = accounts.map(a =>
      `<div class="card">${a.name} (${a.type})</div>`
    ).join("");
  }

  // Initial render
  renderInvoices();
  renderVouchers();
  renderAccounts();
</script>

</body>
</html>
