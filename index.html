<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2Smart Master App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --ios-bg: #F2F2F7; --ios-blue: #007AFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--ios-bg); color: #1C1C1E; -webkit-tap-highlight-color: transparent; }
        .ios-card { background: white; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .ios-input { width: 100%; background: #F2F2F7; border: none; border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; transition: background 0.2s; }
        .ios-input:focus { background: #E5E5EA; }
        .btn-press:active { opacity: 0.6; transform: scale(0.98); }
        .hide-view { display: none !important; }
        /* iOS Bottom Nav */
        .bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
        .nav-item.active { color: var(--ios-blue); }
        /* Ledger Table */
        .table-row { display: grid; grid-template-columns: 2fr 4fr 2.5fr 2.5fr 3fr; gap: 4px; border-bottom: 0.5px solid #E5E5EA; padding: 12px 0; font-size: 11px; align-items: center; }
        .table-header { font-weight: 700; color: #8E8E93; text-transform: uppercase; font-size: 10px; border-bottom: 1px solid #C7C7CC; padding-bottom: 8px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white/90 backdrop-blur-md border-b border-gray-200 z-50 pt-[env(safe-area-inset-top)] flex-shrink-0">
        <div class="flex justify-between items-center px-4 h-14">
            <div class="flex items-center gap-2">
                <button type="button" id="btn-back" onclick="goBack()" class="hide-view text-blue-600 font-semibold text-[17px] btn-press flex items-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> Back
                </button>
                <h1 id="header-title" class="text-[17px] font-semibold tracking-tight">Dashboard</h1>
            </div>
            <button type="button" onclick="switchView('settings')" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center btn-press text-lg">⚙️</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-24">
        
        <div id="view-dashboard" class="view-section space-y-6">
            <div class="ios-card bg-blue-600 text-white p-6 shadow-md shadow-blue-200">
                <p class="text-[11px] font-semibold opacity-80 uppercase tracking-wide">Net Balance (HKD)</p>
                <h2 id="dash-balance" class="text-4xl font-bold mt-1 tracking-tight">0.00</h2>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="switchView('invoice')" class="ios-card p-6 flex flex-col items-center justify-center gap-2 btn-press">
                    <span class="text-3xl">📄</span><span class="font-semibold text-xs text-gray-700 uppercase">Invoicing</span>
                </button>
                <button type="button" onclick="switchView('voucher')" class="ios-card p-6 flex flex-col items-center justify-center gap-2 btn-press">
                    <span class="text-3xl">💰</span><span class="font-semibold text-xs text-gray-700 uppercase">Vouchers</span>
                </button>
                <button type="button" onclick="switchView('accounts')" class="ios-card p-6 flex flex-col items-center justify-center gap-2 btn-press">
                    <span class="text-3xl">👥</span><span class="font-semibold text-xs text-gray-700 uppercase">Party Ledgers</span>
                </button>
                <button type="button" onclick="switchView('reports')" class="ios-card p-6 flex flex-col items-center justify-center gap-2 btn-press">
                    <span class="text-3xl">📊</span><span class="font-semibold text-xs text-gray-700 uppercase">Reports</span>
                </button>
            </div>
        </div>

        <div id="view-accounts" class="view-section hide-view space-y-4">
            <input type="text" id="search-party" placeholder="Search Party..." onkeyup="renderAccounts()" class="ios-input bg-white shadow-sm">
            <div id="accounts-list-container" class="space-y-3">
                </div>
        </div>

        <div id="view-ledger" class="view-section hide-view space-y-4">
            <div class="ios-card bg-gray-800 text-white p-5">
                <h2 id="ledger-party-name" class="text-xl font-bold">Party Name</h2>
                <div class="flex justify-between items-end mt-2">
                    <p class="text-xs text-gray-400 uppercase font-semibold">Total Balance</p>
                    <h3 id="ledger-party-bal" class="text-lg font-bold">HKD 0.00</h3>
                </div>
            </div>
            
            <div class="ios-card p-4">
                <div class="table-row table-header">
                    <span>Date</span><span>Particulars</span><span class="text-right">Debit</span><span class="text-right">Credit</span><span class="text-right">Balance</span>
                </div>
                <div id="ledger-rows-container">
                    </div>
            </div>

            <button type="button" onclick="exportPDF()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-semibold btn-press shadow-md">Export PDF Statement</button>
        </div>

        <div id="view-invoice" class="view-section hide-view space-y-4">
            <div class="ios-card p-4 space-y-4">
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button type="button" id="tab-sale" onclick="setInvType('SALE')" class="flex-1 py-1.5 text-sm font-semibold bg-white rounded-md shadow-sm text-blue-600">SALE</button>
                    <button type="button" id="tab-pur" onclick="setInvType('PURCHASE')" class="flex-1 py-1.5 text-sm font-semibold text-gray-500">PURCHASE</button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div><p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Inv No</p><input type="text" id="inv-no" readonly class="ios-input font-mono text-sm bg-gray-100 text-gray-500"></div>
                    <div><p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Date</p><input type="date" id="inv-date" class="ios-input text-sm"></div>
                </div>

                <div>
                    <p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Select Party</p>
                    <select id="inv-party" class="ios-input text-sm font-medium"></select>
                </div>

                <div class="border-t border-gray-200 pt-3">
                    <div id="inv-items-wrapper" class="space-y-2"></div>
                    <button type="button" onclick="addInvRow()" class="mt-3 text-blue-600 text-[13px] font-semibold flex items-center gap-1 btn-press">
                        <span class="text-lg leading-none">+</span> Add Line Item
                    </button>
                </div>

                <div class="border-t border-gray-200 pt-3 flex justify-between items-center">
                    <span class="text-sm font-semibold text-gray-600 uppercase">Subtotal</span>
                    <span id="inv-total-disp" class="text-2xl font-bold text-gray-900">0.00</span>
                </div>
                
                <button type="button" onclick="saveInvoice()" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-semibold btn-press text-[17px]">Save Entry</button>
            </div>
        </div>

        <div id="view-voucher" class="view-section hide-view space-y-4">
            <div class="ios-card p-4 space-y-4">
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button type="button" id="tab-rct" onclick="setVouType('RECEIPT')" class="flex-1 py-1.5 text-sm font-semibold bg-white rounded-md shadow-sm text-green-600">RECEIPT</button>
                    <button type="button" id="tab-pay" onclick="setVouType('PAYMENT')" class="flex-1 py-1.5 text-sm font-semibold text-gray-500">PAYMENT</button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div><p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Ref No</p><input type="text" id="vou-no" readonly class="ios-input font-mono text-sm bg-gray-100 text-gray-500"></div>
                    <div><p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Date</p><input type="date" id="vou-date" class="ios-input text-sm"></div>
                </div>

                <div>
                    <p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Select Party</p>
                    <select id="vou-party" class="ios-input text-sm font-medium"></select>
                </div>

                <div>
                    <p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Amount (HKD)</p>
                    <input type="number" id="vou-amt" placeholder="0.00" class="ios-input text-2xl font-bold text-gray-900">
                </div>

                <div>
                    <p class="text-[10px] text-gray-500 font-semibold mb-1 ml-1 uppercase">Remarks</p>
                    <textarea id="vou-notes" rows="2" class="ios-input text-sm" placeholder="Optional notes..."></textarea>
                </div>
                
                <button type="button" onclick="saveVoucher()" class="w-full bg-green-600 text-white p-3.5 rounded-xl font-semibold btn-press text-[17px]">Post Voucher</button>
            </div>
        </div>

        <div id="view-settings" class="view-section hide-view space-y-5">
            <div class="ios-card p-4 space-y-3">
                <h3 class="text-[12px] font-bold text-gray-400 uppercase tracking-wide border-b pb-2">Create New Account</h3>
                <input type="text" id="new-party-name" placeholder="Party / Business Name" class="ios-input text-sm">
                <button type="button" onclick="createParty()" class="w-full bg-gray-800 text-white p-3 rounded-xl font-semibold btn-press text-[15px]">Save Account</button>
            </div>

            <div class="ios-card p-4 space-y-3">
                <h3 class="text-[12px] font-bold text-gray-400 uppercase tracking-wide border-b pb-2">Business Profile</h3>
                <input type="text" id="set-comp" placeholder="Company Name" class="ios-input text-sm">
                <input type="text" id="set-addr" placeholder="Address" class="ios-input text-sm">
                <button type="button" onclick="saveProfile()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-semibold btn-press text-[15px]">Update Profile</button>
            </div>

            <button type="button" onclick="factoryReset()" class="w-full text-red-500 font-semibold text-sm p-4 text-center btn-press">Erase All Data</button>
        </div>

        <div id="view-reports" class="view-section hide-view">
            <div class="ios-card p-10 text-center text-gray-400 font-semibold">
                Reporting Module Coming Soon
            </div>
        </div>

    </main>

    <nav class="bg-white/90 backdrop-blur-md border-t border-gray-200 flex-shrink-0 bottom-nav z-50 fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2">
        <div class="flex justify-around items-center h-16">
            <button type="button" onclick="switchView('dashboard')" id="nav-dashboard" class="nav-item active flex flex-col items-center gap-1 w-16 btn-press text-gray-500">
                <span class="text-[22px] leading-none">🏠</span><span class="text-[10px] font-medium">Home</span>
            </button>
            <button type="button" onclick="switchView('invoice')" id="nav-invoice" class="nav-item flex flex-col items-center gap-1 w-16 btn-press text-gray-500">
                <span class="text-[22px] leading-none">📄</span><span class="text-[10px] font-medium">Invoice</span>
            </button>
            <button type="button" onclick="switchView('voucher')" id="nav-voucher" class="nav-item flex flex-col items-center gap-1 w-16 btn-press text-gray-500">
                <span class="text-[22px] leading-none">💰</span><span class="text-[10px] font-medium">Cash</span>
            </button>
            <button type="button" onclick="switchView('accounts')" id="nav-accounts" class="nav-item flex flex-col items-center gap-1 w-16 btn-press text-gray-500">
                <span class="text-[22px] leading-none">📊</span><span class="text-[10px] font-medium">Ledgers</span>
            </button>
        </div>
    </nav>

<script>
/** * CORE DATABASE & STATE
 */
let db = { parties: [], tx: [], conf: {} };
let activeLedgerPartyId = null;
let viewHistory = ['dashboard'];
let currentInvType = 'SALE';
let currentVouType = 'RECEIPT';

function initApp() {
    try {
        let stored = localStorage.getItem('2Smart_Final_DB');
        if (stored) {
            db = JSON.parse(stored);
        } else {
            // Initial Seed Data
            db = {
                parties: [{ id: 1, name: 'Walk-in Customer' }],
                tx: [],
                conf: { name: '2Smart Pvt Limited', addr: 'HK/USA/UAE' }
            };
            saveDB();
        }
    } catch(e) {
        console.error("DB Load Error", e);
        db = { parties: [], tx: [], conf: {} };
    }
    switchView('dashboard');
}

function saveDB() {
    localStorage.setItem('2Smart_Final_DB', JSON.stringify(db));
    calculateDashBalance();
}

/** * NAVIGATION ENGINE (No more white screens)
 */
function switchView(viewId, isBack = false) {
    // 1. Hide all views
    document.querySelectorAll('.view-section').forEach(el => el.classList.add('hide-view'));
    
    // 2. Show target view
    const target = document.getElementById('view-' + viewId);
    if(target) target.classList.remove('hide-view');

    // 3. Update Title & History
    document.getElementById('header-title').innerText = viewId.charAt(0).toUpperCase() + viewId.slice(1);
    
    if (!isBack && viewHistory[viewHistory.length - 1] !== viewId) {
        viewHistory.push(viewId);
    }

    // 4. Back Button Logic
    const backBtn = document.getElementById('btn-back');
    if (viewId === 'dashboard') {
        backBtn.classList.add('hide-view');
        viewHistory = ['dashboard']; // Reset history
    } else {
        backBtn.classList.remove('hide-view');
    }

    // 5. Update Bottom Nav Colors
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-blue-600'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.add('text-gray-500'));
    const activeTab = document.getElementById('nav-' + viewId);
    if(activeTab) {
        activeTab.classList.remove('text-gray-500');
        activeTab.classList.add('active', 'text-blue-600');
    }

    // 6. View Specific Logic trigger
    if (viewId === 'dashboard') calculateDashBalance();
    if (viewId === 'accounts') renderAccounts();
    if (viewId === 'invoice') setupInvoiceView();
    if (viewId === 'voucher') setupVoucherView();
    if (viewId === 'settings') setupSettingsView();
}

function goBack() {
    if (viewHistory.length > 1) {
        viewHistory.pop(); // remove current
        let prev = viewHistory[viewHistory.length - 1];
        switchView(prev, true);
    } else {
        switchView('dashboard');
    }
}

/** * DASHBOARD LOGIC
 */
function calculateDashBalance() {
    let total = 0;
    db.tx.forEach(t => {
        if (t.type === 'SALE' || t.type === 'PAYMENT') total += t.amt;
        else if (t.type === 'PURCHASE' || t.type === 'RECEIPT') total -= t.amt;
    });
    document.getElementById('dash-balance').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
}

/** * ACCOUNTS & LEDGER LOGIC
 */
function renderAccounts() {
    const q = document.getElementById('search-party').value.toLowerCase();
    const container = document.getElementById('accounts-list-container');
    let html = '';

    db.parties.filter(p => p.name.toLowerCase().includes(q)).forEach(p => {
        let bal = getPartyBalance(p.id);
        let colorClass = bal >= 0 ? 'text-green-600' : 'text-red-600';
        html += `
            <button type="button" onclick="openLedger(${p.id}, '${p.name}')" class="w-full text-left ios-card p-4 flex justify-between items-center btn-press">
                <span class="font-semibold text-[15px]">${p.name}</span>
                <span class="font-mono font-bold ${colorClass}">${bal.toLocaleString()} <span class="text-gray-300 ml-1">❯</span></span>
            </button>
        `;
    });

    container.innerHTML = html || '<p class="text-center text-gray-400 text-sm mt-4">No parties found.</p>';
}

function getPartyBalance(pid) {
    let bal = 0;
    db.tx.filter(t => t.partyId == pid).forEach(t => {
        if (t.type === 'SALE' || t.type === 'PAYMENT') bal += t.amt;
        else if (t.type === 'PURCHASE' || t.type === 'RECEIPT') bal -= t.amt;
    });
    return bal;
}

function openLedger(pid, pname) {
    activeLedgerPartyId = pid;
    document.getElementById('ledger-party-name').innerText = pname;
    
    let running = 0;
    let html = '';
    
    const txs = db.tx.filter(t => t.partyId == pid).sort((a,b) => new Date(a.date) - new Date(b.date));
    
    txs.forEach(t => {
        let dr = (t.type === 'SALE' || t.type === 'PAYMENT') ? t.amt : 0;
        let cr = (t.type === 'PURCHASE' || t.type === 'RECEIPT') ? t.amt : 0;
        running += (dr - cr);
        
        let dateStr = t.date.split('-').slice(1).reverse().join('/'); // MM/DD
        
        html += `
            <div class="table-row">
                <span class="text-gray-500">${dateStr}</span>
                <span class="font-semibold text-gray-800 leading-tight">${t.no}<br><span class="text-[9px] font-normal text-gray-400 uppercase">${t.type}</span></span>
                <span class="text-right text-red-500 font-medium">${dr ? dr.toLocaleString() : '-'}</span>
                <span class="text-right text-green-600 font-medium">${cr ? cr.toLocaleString() : '-'}</span>
                <span class="text-right font-bold text-gray-900">${running.toLocaleString()}</span>
            </div>
        `;
    });

    document.getElementById('ledger-rows-container').innerHTML = html || '<p class="text-center py-6 text-gray-400">No transactions.</p>';
    document.getElementById('ledger-party-bal').innerText = "HKD " + running.toLocaleString();
    
    switchView('ledger');
}

/** * INVOICE LOGIC
 */
function setupInvoiceView() {
    document.getElementById('inv-date').valueAsDate = new Date();
    populateDropdown('inv-party');
    setInvType('SALE');
    document.getElementById('inv-items-wrapper').innerHTML = '';
    addInvRow();
}

function setInvType(type) {
    currentInvType = type;
    const tabSale = document.getElementById('tab-sale');
    const tabPur = document.getElementById('tab-pur');
    
    if(type === 'SALE') {
        tabSale.className = "flex-1 py-1.5 text-sm font-semibold bg-white rounded-md shadow-sm text-blue-600";
        tabPur.className = "flex-1 py-1.5 text-sm font-semibold text-gray-500";
    } else {
        tabPur.className = "flex-1 py-1.5 text-sm font-semibold bg-white rounded-md shadow-sm text-orange-600";
        tabSale.className = "flex-1 py-1.5 text-sm font-semibold text-gray-500";
    }
    generateTxNo('inv-no', type === 'SALE' ? 'SIN' : 'PIN', type);
}

function addInvRow() {
    const wrap = document.getElementById('inv-items-wrapper');
    const row = document.createElement('div');
    row.className = "flex gap-2 items-center bg-gray-50 p-1.5 rounded-lg border border-gray-100";
    row.innerHTML = `
        <input type="text" placeholder="Item Name" class="flex-1 bg-transparent text-sm px-2 py-1 outline-none">
        <input type="number" placeholder="Qty" oninput="calcInvTotal()" class="w-16 bg-transparent text-sm text-center outline-none">
        <input type="number" placeholder="Rate" oninput="calcInvTotal()" class="w-20 bg-transparent text-sm text-right font-semibold outline-none">
    `;
    wrap.appendChild(row);
}

function calcInvTotal() {
    let total = 0;
    document.querySelectorAll('#inv-items-wrapper > div').forEach(row => {
        let inputs = row.querySelectorAll('input');
        let q = parseFloat(inputs[1].value) || 0;
        let r = parseFloat(inputs[2].value) || 0;
        total += (q * r);
    });
    document.getElementById('inv-total-disp').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
}

function saveInvoice() {
    let totalStr = document.getElementById('inv-total-disp').innerText.replace(/,/g, '');
    let total = parseFloat(totalStr);
    let partyId = document.getElementById('inv-party').value;

    if (total <= 0 || !partyId) return alert("Please check items and party selection.");

    db.tx.push({
        id: Date.now(),
        no: document.getElementById('inv-no').value,
        date: document.getElementById('inv-date').value,
        partyId: parseInt(partyId),
        type: currentInvType,
        amt: total
    });

    saveDB();
    alert("Invoice Saved!");
    goBack();
}

/** * VOUCHER LOGIC
 */
function setupVoucherView() {
    document.getElementById('vou-date').valueAsDate = new Date();
    document.getElementById('vou-amt').value = '';
    document.getElementById('vou-notes').value = '';
    populateDropdown('vou-party');
    setVouType('RECEIPT');
}

function setVouType(type) {
    currentVouType = type;
    const tabRct = document.getElementById('tab-rct');
    const tabPay = document.getElementById('tab-pay');
    
    if(type === 'RECEIPT') {
        tabRct.className = "flex-1 py-1.5 text-sm font-semibold bg-white rounded-md shadow-sm text-green-600";
        tabPay.className = "flex-1 py-1.5 text-sm font-semibold text-gray-500";
    } else {
        tabPay.className = "flex-1 py-1.5 text-sm font-semibold bg-white rounded-md shadow-sm text-red-600";
        tabRct.className = "flex-1 py-1.5 text-sm font-semibold text-gray-500";
    }
    generateTxNo('vou-no', type === 'RECEIPT' ? 'RCT' : 'PAY', type);
}

function saveVoucher() {
    let amt = parseFloat(document.getElementById('vou-amt').value);
    let partyId = document.getElementById('vou-party').value;

    if (!amt || amt <= 0 || !partyId) return alert("Enter valid amount and select party.");

    db.tx.push({
        id: Date.now(),
        no: document.getElementById('vou-no').value,
        date: document.getElementById('vou-date').value,
        partyId: parseInt(partyId),
        type: currentVouType,
        amt: amt,
        notes: document.getElementById('vou-notes').value
    });

    saveDB();
    alert("Voucher Posted!");
    goBack();
}

/** * SETTINGS LOGIC
 */
function setupSettingsView() {
    document.getElementById('set-comp').value = db.conf.name || '';
    document.getElementById('set-addr').value = db.conf.addr || '';
}

function createParty() {
    const input = document.getElementById('new-party-name');
    const name = input.value.trim();
    if(!name) return alert("Name required");
    
    db.parties.push({ id: Date.now(), name: name });
    saveDB();
    input.value = '';
    alert("Party Added!");
}

function saveProfile() {
    db.conf.name = document.getElementById('set-comp').value;
    db.conf.addr = document.getElementById('set-addr').value;
    saveDB();
    alert("Profile Saved!");
}

function factoryReset() {
    if(confirm("Warning! This will erase all ledgers and data. Continue?")) {
        localStorage.removeItem('2Smart_Final_DB');
        location.reload();
    }
}

/** * UTILS
 */
function populateDropdown(selectId) {
    const sel = document.getElementById(selectId);
    if(sel) {
        sel.innerHTML = db.parties.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }
}

function generateTxNo(inputId, prefix, typeMatch) {
    const count = db.tx.filter(t => t.type === typeMatch).length + 1;
    document.getElementById(inputId).value = `${prefix}-${count.toString().padStart(4, '0')}`;
}

// Simple PDF Export
function exportPDF() {
    if(!activeLedgerPartyId) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const p = db.parties.find(x => x.id === activeLedgerPartyId);
    
    doc.setFontSize(18);
    doc.text(db.conf.name || "Company Name", 14, 20);
    doc.setFontSize(12);
    doc.text("Party Ledger: " + p.name, 14, 30);
    
    let tableData = [];
    let running = 0;
    
    db.tx.filter(t => t.partyId == activeLedgerPartyId).sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
        let dr = (t.type === 'SALE' || t.type === 'PAYMENT') ? t.amt : 0;
        let cr = (t.type === 'PURCHASE' || t.type === 'RECEIPT') ? t.amt : 0;
        running += (dr - cr);
        tableData.push([t.date, t.no + " (" + t.type + ")", dr || '-', cr || '-', running]);
    });

    doc.autoTable({
        startY: 40,
        head: [['Date', 'Ref / Particulars', 'Debit', 'Credit', 'Balance']],
        body: tableData,
        theme: 'grid',
        headStyles: { fillColor: [0, 122, 255] }
    });

    doc.save(`${p.name.replace(/\s+/g, '_')}_Statement.pdf`);
}

// BOOT
window.onload = initApp;
