<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2Smart Pro ERP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F2F2F7; }
        .ios-blur { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .screen { display: none; min-height: 100vh; transition: all 0.3s ease; }
        .active-screen { display: block; }
        /* Lush Gradients from your images */
        .grad-blue { background: linear-gradient(135deg, #007AFF, #00C6FF); }
        .grad-purple { background: linear-gradient(135deg, #5856D6, #AF52DE); }
        .grad-orange { background: linear-gradient(135deg, #FF9500, #FFCC00); }
    </style>
</head>
<body>

    <div id="app">
        
        <header class="sticky top-0 z-50 ios-blur p-4 flex justify-between items-center border-b border-gray-200">
            <div id="header-context">
                <p class="text-[10px] font-black text-blue-600 tracking-widest uppercase">2Smart Pvt Ltd</p>
                <h2 id="view-title" class="text-xl font-black text-gray-900 leading-tight">DASHBOARD</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="App.sync()" class="bg-gray-100 p-2 rounded-xl">🔄</button>
                <button onclick="App.settings()" class="bg-gray-100 p-2 rounded-xl">⚙️</button>
            </div>
        </header>

        <main id="screen-container" class="p-4">
            </main>

    </div>

    <script>
        /**
         * APP STATE ENGINE (Like AppState in SwiftUI)
         * Isme humara sara logic aur data store hoga.
         */
        const App = {
            // Internal Database
            state: {
                user: "Admin",
                transactions: [],
                accounts: [
                    { id: 'R-101', name: 'ASIF AK', type: 'Receivable' },
                    { id: 'P-102', name: 'HONGKONG', type: 'Payable' }
                ],
                currentView: 'dashboard'
            },

            // Initialization
            init() {
                console.log("2Smart System Initialized...");
                this.loadData();
                this.renderDashboard(); // Sabse pehle dashboard dikhao
            },

            // Navigation Logic
            navigate(viewName, title) {
                document.getElementById('view-title').innerText = title.toUpperCase();
                this.state.currentView = viewName;
                // Hum component-based rendering karenge
                this['render' + viewName.charAt(0).toUpperCase() + viewName.slice(1)]();
            },

            // Data Persistence
            saveData() {
                localStorage.setItem('2smart_pro_state', JSON.stringify(this.state));
            },

            loadData() {
                const saved = localStorage.getItem('2smart_pro_state');
                if (saved) this.state = JSON.parse(saved);
            },

            // View Renders (Inhe hum ek ek karke detail mein likhenge)
            renderDashboard() {
                const container = document.getElementById('screen-container');
                container.innerHTML = `
                    <div class="grid grid-cols-2 gap-4 fade-in">
                        <div onclick="App.navigate('invoice', 'Invoicing')" class="grad-blue p-6 rounded-[30px] text-white shadow-lg active:scale-95 transition-all cursor-pointer">
                            <div class="bg-white/20 w-10 h-10 rounded-2xl flex items-center justify-center mb-6">📄</div>
                            <h3 class="font-black text-lg">INVOICE</h3>
                            <p class="text-[10px] opacity-80 uppercase font-bold">Sales & Purchase</p>
                        </div>
                        <div onclick="App.navigate('voucher', 'Vouchers')" class="grad-purple p-6 rounded-[30px] text-white shadow-lg active:scale-95 transition-all cursor-pointer">
                            <div class="bg-white/20 w-10 h-10 rounded-2xl flex items-center justify-center mb-6">💰</div>
                            <h3 class="font-black text-lg">VOUCHER</h3>
                            <p class="text-[10px] opacity-80 uppercase font-bold">Cash Flow</p>
                        </div>
                    </div>
                `;
            },

            renderInvoice() {
                const container = document.getElementById('screen-container');
                
                // State for current invoice items (Image 4930 logic)
                if(!this.state.currentEntry) {
                    this.state.currentEntry = {
                        id: `SIN-${String(this.state.transactions.length + 1).padStart(5, '0')}`,
                        date: new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}),
                        partyId: this.state.accounts[0].id,
                        type: 'SALE',
                        items: [{ desc: '', qty: 0, rate: 0, total: 0 }]
                    };
                },

                const entry = this.state.currentEntry;

                container.innerHTML = `
                    <div class="fade-in pb-24">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="App.navigate('dashboard', 'Dashboard')" class="text-blue-600 font-bold flex items-center">
                                <span class="text-2xl mr-1">‹</span> Back
                            </button>
                            <div class="flex bg-gray-200 p-1 rounded-xl">
                                <button onclick="App.setInvType('SALE')" class="${entry.type === 'SALE' ? 'bg-blue-600 text-white' : 'text-gray-500'} px-6 py-2 rounded-lg font-black text-xs transition-all">SALE</button>
                                <button onclick="App.setInvType('PURCHASE')" class="${entry.type === 'PURCHASE' ? 'bg-blue-600 text-white' : 'text-gray-500'} px-6 py-2 rounded-lg font-black text-xs transition-all ml-1">PURCHASE</button>
                            </div>
                        </div>

                        <div class="flex justify-between items-end mb-4">
                            <h2 class="text-blue-600 text-xl font-black">${entry.id}</h2>
                            <div class="bg-gray-100 px-4 py-2 rounded-xl font-bold text-gray-700">${entry.date}</div>
                        </div>

                        <div class="mb-6">
                            <select id="inv-party" onchange="App.state.currentEntry.partyId = this.value" class="w-full p-4 bg-blue-50 text-blue-800 rounded-xl font-black border-none appearance-none shadow-sm">
                                ${this.state.accounts.map(acc => `<option value="${acc.id}" ${acc.id === entry.partyId ? 'selected' : ''}>${acc.id} | ${acc.name}</option>`).join('')}
                            </select>
                        </div>

                        <div class="grid grid-cols-12 gap-2 px-2 mb-2 text-[10px] font-black text-gray-400 uppercase">
                            <div class="col-span-5">Item</div>
                            <div class="col-span-2 text-right">Qty</div>
                            <div class="col-span-2 text-right">Rate</div>
                            <div class="col-span-3 text-right">Total</div>
                        </div>

                        <div id="item-rows" class="space-y-3 mb-6">
                            ${entry.items.map((item, index) => `
                                <div class="grid grid-cols-12 gap-2 items-center bg-white p-3 rounded-xl shadow-sm">
                                    <input type="text" value="${item.desc}" oninput="App.updateItem(${index}, 'desc', this.value)" placeholder="Model..." class="col-span-5 font-bold text-sm outline-none">
                                    <input type="number" value="${item.qty}" oninput="App.updateItem(${index}, 'qty', this.value)" class="col-span-2 text-right font-bold text-sm outline-none bg-gray-50 rounded p-1">
                                    <input type="number" value="${item.rate}" oninput="App.updateItem(${index}, 'rate', this.value)" class="col-span-2 text-right font-bold text-sm outline-none bg-gray-50 rounded p-1">
                                    <div class="col-span-3 text-right font-black text-blue-600 text-sm">${(item.qty * item.rate).toLocaleString()}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md p-4 border-t border-gray-100 flex items-center justify-between gap-2">
                             <div class="flex gap-2">
                                <button class="bg-gray-200 w-10 h-10 rounded-xl flex items-center justify-center font-bold">‹</button>
                                <button class="bg-gray-200 w-10 h-10 rounded-xl flex items-center justify-center font-bold">›</button>
                             </div>
                             <button onclick="App.addItemRow()" class="bg-gray-100 w-10 h-10 rounded-xl text-blue-600 text-2xl font-bold">+</button>
                             
                             <div class="flex-1 text-right pr-2">
                                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Amount</p>
                                <p class="text-lg font-black">${this.calculateTotal().toLocaleString()}</p>
                             </div>

                             <button onclick="App.saveAndPrint()" class="bg-green-500 text-white px-8 py-3 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition-all">UPDATE</button>
                        </div>
                    </div>
                `;
            },

            // --- HELPER LOGIC FOR PRO VIEW ---
            updateItem(index, field, value) {
                const item = this.state.currentEntry.items[index];
                item[field] = field === 'desc' ? value : parseFloat(value) || 0;
                item.total = item.qty * item.rate;
                this.renderInvoice(); // Refresh view
            },

            addItemRow() {
                this.state.currentEntry.items.push({ desc: '', qty: 0, rate: 0, total: 0 });
                this.renderInvoice();
            },

            calculateTotal() {
                return this.state.currentEntry.items.reduce((sum, item) => sum + (item.qty * item.rate), 0);
            },

            saveAndPrint() {
                const entry = this.state.currentEntry;
                const total = this.calculateTotal();
                if(total <= 0) return alert("Pehle items to daalein!");

                // Save to transactions
                this.state.transactions.push({
                    ...entry,
                    amount: total,
                    timestamp: Date.now()
                });
                
                this.saveData();
                alert("Invoice Saved Successfully!");
                this.generatePDF(entry); // PDF Trigger
            },

            generatePDF(entry) {
                // Image 4931 style PDF (Simple Version)
                const win = window.open('', '_blank');
                win.document.write(`
                    <html>
                    <head><title>${entry.id}</title></head>
                    <body style="font-family: sans-serif; padding: 40px; color: #333;">
                        <h1 style="color: #007AFF;">2SMART PVT LIMITED</h1>
                        <p>Flat C 11/F Hang Wan Building, Hong Kong</p>
                        <hr>
                        <div style="display: flex; justify-content: space-between;">
                            <h2>INVOICE: ${entry.id}</h2>
                            <h3>DATE: ${entry.date}</h3>
                        </div>
                        <p><strong>BILL TO:</strong> ${entry.partyId}</p>
                        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                            <tr style="background: #f0f0f0; text-align: left;">
                                <th style="padding: 10px;">Description</th>
                                <th style="padding: 10px;">Qty</th>
                                <th style="padding: 10px;">Rate</th>
                                <th style="padding: 10px;">Total</th>
                            </tr>
                            ${entry.items.map(i => `
                                <tr>
                                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${i.desc}</td>
                                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${i.qty}</td>
                                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${i.rate}</td>
                                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${i.total}</td>
                                </tr>
                            `).join('')}
                        </table>
                        <h2 style="text-align: right; color: #007AFF; margin-top: 30px;">BALANCE DUE HKD $${this.calculateTotal().toLocaleString()}</h2>
                    </body>
                    </html>
                `);
                win.print();
                this.state.currentEntry = null; // Reset for next
                this.navigate('dashboard', 'Dashboard');
            }

// Yeh function bhi paste karein (App object ke andar hi)
postInvoice(invNo) {
    const amt = parseFloat(document.getElementById('inv-amt').value);
    if(!amt) return alert("Amount likho bhai!");

    this.state.transactions.push({
        id: invNo,
        partyId: document.getElementById('inv-party-id').value,
        amount: amt,
        type: 'SALE',
        date: '25 Apr'
    });
    this.saveData();
    this.navigate('dashboard', 'Dashboard');
}
        };

        // Start the Engine
        window.onload = () => App.init();
    </script>
</body>
</html>
