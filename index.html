<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2Smart ERP v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F2F2F7; user-select: none; }
        .ios-card { background: white; border-radius: 20px; transition: all 0.2s; }
        .ios-card:active { transform: scale(0.97); opacity: 0.8; }
        .hidden { display: none !important; }
        .tab-bar { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-top: 0.5px solid #d1d1d6; }
        input, select { background: #E9E9EB; border-radius: 12px; padding: 14px; border: none; width: 100%; outline: none; font-size: 16px; }
        .safe-area-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
        .ledger-line { border-bottom: 0.5px solid #E5E5EA; padding: 12px 0; }
    </style>
</head>
<body class="max-w-md mx-auto">

    <div id="main-content" class="safe-area-bottom min-h-screen">
        
        <header class="sticky top-0 bg-[#F2F2F7]/90 backdrop-blur-lg z-50 p-6 pb-2">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-blue-600 tracking-widest uppercase">2Smart Pvt Ltd</p>
                    <h1 id="nav-title" class="text-2xl font-black italic">DASHBOARD</h1>
                </div>
                <div id="header-actions">
                    <button onclick="showView('settings')" class="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center">⚙️</button>
                </div>
            </div>
        </header>

        <section id="view-dashboard" class="p-4 space-y-4">
            <div class="ios-card bg-blue-600 p-6 text-white shadow-xl shadow-blue-200">
                <p class="text-[10px] font-bold opacity-70">NET RECEIVABLE (HKD)</p>
                <h2 id="dash-bal" class="text-3xl font-black mt-1">0.00</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <div onclick="showView('invoice')" class="ios-card p-6 flex flex-col items-center border-b-4 border-blue-500">
                    <span class="text-3xl mb-2">📑</span>
                    <span class="font-bold text-[11px] uppercase">Invoice</span>
                </div>
                <div onclick="showView('voucher')" class="ios-card p-6 flex flex-col items-center border-b-4 border-green-500">
                    <span class="text-3xl mb-2">💰</span>
                    <span class="font-bold text-[11px] uppercase">Voucher</span>
                </div>
                <div onclick="showView('accounts')" class="ios-card p-6 flex flex-col items-center border-b-4 border-orange-500">
                    <span class="text-3xl mb-2">👥</span>
                    <span class="font-bold text-[11px] uppercase">Accounts</span>
                </div>
                <div onclick="showView('reports')" class="ios-card p-6 flex flex-col items-center border-b-4 border-purple-500">
                    <span class="text-3xl mb-2">📊</span>
                    <span class="font-bold text-[11px] uppercase">Reports</span>
                </div>
            </div>
        </section>

        <section id="view-accounts" class="hidden p-4 space-y-4">
            <input type="text" id="acc-search" placeholder="🔍 Search Party..." oninput="renderAccountList()" class="!bg-white">
            <div id="acc-list" class="space-y-2"></div>
        </section>

        <section id="view-ledger" class="hidden p-4 space-y-4 bg-white min-h-screen">
            <div class="flex justify-between items-center mb-6">
                <h2 id="led-name" class="text-xl font-black text-blue-600"></h2>
                <div class="text-right">
                    <p class="text-[9px] text-gray-400">BALANCE</p>
                    <p id="led-bal" class="font-black text-lg"></p>
                </div>
            </div>
            <div class="grid grid-cols-5 text-[9px] font-black text-gray-400 uppercase border-b pb-2">
                <span>Date</span><span class="col-span-2">Details</span><span>DR</span><span>CR</span>
            </div>
            <div id="led-rows" class="text-sm"></div>
        </section>

        <section id="view-settings" class="hidden p-4 space-y-6">
            <div class="ios-card p-4 space-y-4">
                <h3 class="font-black text-blue-600 border-b pb-2">Add New Party</h3>
                <input type="text" id="new-p-name" placeholder="Party Name">
                <select id="new-p-type">
                    <option value="Receivable">Receivable (Customer)</option>
                    <option value="Payable">Payable (Supplier)</option>
                </select>
                <button onclick="addParty()" class="bg-blue-600 text-white p-4 rounded-2xl w-full font-black">SAVE PARTY</button>
            </div>
            <div class="ios-card p-4">
                <h3 class="font-black text-red-600 border-b pb-2">System Control</h3>
                <button onclick="wipeData()" class="text-red-500 text-xs font-bold mt-4">WIPE ALL DATA (RESET)</button>
            </div>
        </section>

    </div>

    <nav class="tab-bar fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center px-4 z-[100]">
        <button onclick="showView('dashboard')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-blue-600"><span>🏠</span>HOME</button>
        <button onclick="showView('invoice')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400"><span>📑</span>INVOICE</button>
        <button onclick="showView('voucher')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400"><span>💰</span>CASH</button>
        <button onclick="showView('accounts')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400"><span>📊</span>LEDGER</button>
    </nav>

    <script>
        // --- GLOBAL DATA ---
        let db = JSON.parse(localStorage.getItem('2Smart_V4_Final')) || {
            parties: [{id: 101, name: 'CASH SALE', type: 'Receivable'}],
            tx: []
        };

        // --- NAVIGATION ENGINE (Fixed White Screen) ---
        function showView(viewId) {
            try {
                // Hide all sections
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                
                // Show requested section
                const target = document.getElementById('view-' + viewId);
                if(target) {
                    target.classList.remove('hidden');
                    document.getElementById('nav-title').innerText = viewId.toUpperCase();
                }

                // Header Back Button Logic
                const headerActions = document.getElementById('header-actions');
                if(viewId !== 'dashboard') {
                    headerActions.innerHTML = `<button onclick="showView('dashboard')" class="text-blue-600 font-bold text-sm">Cancel</button>`;
                } else {
                    headerActions.innerHTML = `<button onclick="showView('settings')" class="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center">⚙️</button>`;
                }

                // Load Data for specific views
                if(viewId === 'accounts') renderAccountList();
                window.scrollTo(0,0);
            } catch (e) {
                console.error("Navigation Error:", e);
                alert("Something went wrong. Redirecting to home.");
                location.reload();
            }
        }

        // --- ACCOUNT & PARTY LOGIC ---
        function addParty() {
            const name = document.getElementById('new-p-name').value;
            const type = document.getElementById('new-p-type').value;
            if(!name) return alert("Enter Party Name");
            
            db.parties.push({ id: Date.now(), name, type });
            save();
            document.getElementById('new-p-name').value = '';
            alert("Account Created!");
            showView('accounts');
        }

        function renderAccountList() {
            const q = document.getElementById('acc-search').value.toLowerCase();
            let html = '';
            db.parties.filter(p => p.name.toLowerCase().includes(q)).forEach(p => {
                const bal = getPartyBalance(p.id);
                html += `
                    <div onclick="openLedger(${p.id}, '${p.name}')" class="ios-card p-5 flex justify-between items-center mb-2 shadow-sm">
                        <div>
                            <p class="text-[9px] font-black text-gray-400 uppercase">${p.type}</p>
                            <h4 class="font-black text-lg">${p.name}</h4>
                        </div>
                        <div class="text-right">
                            <p class="font-mono font-bold ${bal >= 0 ? 'text-green-600' : 'text-red-600'}">${bal.toLocaleString()}</p>
                            <span class="text-[10px] text-gray-300">DETAILS ❯</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('acc-list').innerHTML = html || '<p class="text-center p-10 text-gray-400">No accounts found.</p>';
        }

        function openLedger(pid, pname) {
            showView('ledger');
            document.getElementById('led-name').innerText = pname;
            let runningBal = 0;
            let html = '';
            
            db.tx.filter(t => t.partyId == pid).forEach(t => {
                let dr = (t.type === 'SALE' || t.type === 'PAYMENT') ? t.amount : 0;
                let cr = (t.type === 'PURCHASE' || t.type === 'RECEIPT') ? t.amount : 0;
                runningBal += (dr - cr);
                
                html += `
                    <div class="grid grid-cols-5 ledger-line items-center">
                        <span class="text-[10px] text-gray-400">${t.date.split('-').slice(1).join('/')}</span>
                        <span class="col-span-2 font-bold text-[11px] leading-tight">${t.no}<br><span class="text-[9px] font-normal opacity-50">${t.type}</span></span>
                        <span class="text-red-500 font-bold">${dr || '-'}</span>
                        <span class="text-green-600 font-bold">${cr || '-'}</span>
                    </div>
                `;
            });
            
            document.getElementById('led-rows').innerHTML = html;
            document.getElementById('led-bal').innerText = runningBal.toLocaleString();
        }

        function getPartyBalance(pid) {
            return db.tx.filter(t => t.partyId == pid).reduce((acc, t) => {
                let dr = (t.type === 'SALE' || t.type === 'PAYMENT') ? t.amount : 0;
                let cr = (t.type === 'PURCHASE' || t.type === 'RECEIPT') ? t.amount : 0;
                return acc + (dr - cr);
            }, 0);
        }

        // --- SYSTEM UTILS ---
        function save() { 
            localStorage.setItem('2Smart_V4_Final', JSON.stringify(db)); 
            updateDashBal();
        }
        function updateDashBal() {
            const total = db.tx.reduce((acc, t) => {
                let dr = (t.type === 'SALE' || t.type === 'PAYMENT') ? t.amount : 0;
                let cr = (t.type === 'PURCHASE' || t.type === 'RECEIPT') ? t.amount : 0;
                return acc + (dr - cr);
            }, 0);
            document.getElementById('dash-bal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }
        function wipeData() { if(confirm("This will delete everything. Proceed?")) { localStorage.clear(); location.reload(); } }

        // Start
        updateDashBal();
    </script>
</body>
</html>
