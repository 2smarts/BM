<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2Smart Pvt Limited</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; }
        .gradient-invoice { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .gradient-voucher { background: linear-gradient(135deg, #10b981, #059669); }
        .gradient-accounts { background: linear-gradient(135deg, #f97316, #ea580c); }
        .gradient-reports { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="p-4">

    <div id="dashboard" class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <span class="text-blue-500 text-xs font-black tracking-widest uppercase">Management System</span>
                <h1 class="text-2xl font-black text-gray-900 leading-tight">2SMART PVT LIMITED</h1>
            </div>
            <button class="bg-gray-200 p-3 rounded-2xl shadow-inner">⚙️</button>
        </header>

        <p class="text-gray-500 font-bold mb-4 uppercase text-sm tracking-tighter">Business Operations</p>
        
        <div class="grid grid-cols-2 gap-4">
            <div onclick="showView('invoice')" class="gradient-invoice p-6 rounded-[30px] shadow-lg text-white cursor-pointer active:scale-95 transition-transform">
                <div class="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center mb-4">📄</div>
                <h2 class="font-bold text-lg leading-tight">INVOICE</h2>
                <p class="text-[10px] opacity-80">Sales & Purchase</p>
            </div>
            
            <div onclick="showView('voucher')" class="gradient-voucher p-6 rounded-[30px] shadow-lg text-white cursor-pointer active:scale-95 transition-transform">
                <div class="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center mb-4">💰</div>
                <h2 class="font-bold text-lg leading-tight">VOUCHER</h2>
                <p class="text-[10px] opacity-80">Cash Flow</p>
            </div>

            <div onclick="showView('accounts')" class="gradient-accounts p-6 rounded-[30px] shadow-lg text-white cursor-pointer active:scale-95 transition-transform">
                <div class="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center mb-4">📇</div>
                <h2 class="font-bold text-lg leading-tight">ACCOUNTS</h2>
                <p class="text-[10px] opacity-80">Party Balance</p>
            </div>

            <div onclick="showView('reports')" class="gradient-reports p-6 rounded-[30px] shadow-lg text-white cursor-pointer active:scale-95 transition-transform">
                <div class="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center mb-4">📊</div>
                <h2 class="font-bold text-lg leading-tight">REPORTS</h2>
                <p class="text-[10px] opacity-80">Audit History</p>
            </div>
        </div>
    </div>

    <div id="invoice" class="hidden max-w-md mx-auto">
        <button onclick="showView('dashboard')" class="text-blue-600 font-bold mb-4">← Back</button>
        <div class="bg-white p-4 rounded-3xl shadow-sm border">
            <h2 class="text-xl font-black mb-4">Invoice Entry</h2>
            <div class="flex gap-2 mb-4">
                <button class="bg-blue-600 text-white flex-1 py-2 rounded-lg font-bold">SALE</button>
                <button class="bg-gray-200 flex-1 py-2 rounded-lg font-bold">PURCHASE</button>
            </div>
            <input type="text" id="inv_party" placeholder="Party Name" class="w-full p-3 bg-gray-100 rounded-xl mb-3 outline-none">
            <input type="number" id="inv_amount" placeholder="Total Amount" class="w-full p-4 text-2xl font-bold bg-blue-50 text-blue-600 rounded-xl mb-4">
            <button onclick="saveTransaction('SALE')" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">POST INVOICE</button>
        </div>
    </div>

    <div id="accounts" class="hidden max-w-md mx-auto">
        <button onclick="showView('dashboard')" class="text-blue-600 font-bold mb-4">← Back</button>
        <div class="bg-white p-4 rounded-3xl shadow-sm mb-4">
            <h2 class="text-xl font-black">Account Manager</h2>
            <div id="account-list" class="mt-4 space-y-3">
                </div>
        </div>
    </div>

    <script>
        // --- DATA LOGIC ---
        let state = JSON.parse(localStorage.getItem('2smart_data')) || { transactions: [], accounts: ['ASIF AK', 'HASAN DND', 'TMG'] };

        function showView(viewId) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'accounts') renderAccounts();
        }

        function saveTransaction(type) {
            const party = document.getElementById('inv_party').value;
            const amount = document.getElementById('inv_amount').value;
            if(!party || !amount) return alert('Pora data bharein');

            const newTx = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                party: party,
                amount: parseFloat(amount),
                type: type
            };

            state.transactions.push(newTx);
            localStorage.setItem('2smart_data', JSON.stringify(state));
            alert('Entry Saved!');
            showView('dashboard');
        }

        function renderAccounts() {
            const list = document.getElementById('account-list');
            list.innerHTML = state.accounts.map(acc => `
                <div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center border">
                    <div>
                        <p class="font-black text-gray-800">${acc}</p>
                        <p class="text-xs text-blue-500 font-bold uppercase">Receivable</p>
                    </div>
                    <span class="text-blue-600 font-black">Details →</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
