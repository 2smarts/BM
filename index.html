<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* iPhone jaisa feel dene ke liye custom CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div id="app">
    </div>

<script>
// --- DATA STORAGE & STATE (Aapka AppState logic) ---
const State = {
    accounts: JSON.parse(localStorage.getItem('accounts')) || [],
    transactions: JSON.parse(localStorage.getItem('transactions')) || [],
    config: JSON.parse(localStorage.getItem('config')) || {
        companyName: "MY BUSINESS",
        companyAddress: "Office 123, Tower A",
        companyPhone: "+852 XXXX XXXX",
        companyEmail: "info@business.com",
        bankName: "HSBC",
        bankAccName: "Business Ltd",
        bankAccNo: "123-456789-001",
        bankSwift: "HSBC HK HHH",
        bankBRCode: "BR12345"
    },

    save() {
        localStorage.setItem('accounts', JSON.stringify(this.accounts));
        localStorage.setItem('transactions', JSON.stringify(this.transactions));
        localStorage.setItem('config', JSON.stringify(this.config));
    }
};

// --- INITIAL UI RENDER ---
function init() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="p-6">
            <h1 class="text-xs font-black text-blue-600 tracking-widest uppercase">Management System</h1>
            <h2 class="text-3xl font-black text-gray-900 mb-6">${State.config.companyName.toUpperCase()}</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <div onclick="alert('Invoices Open')" class="ios-card p-4 bg-gradient-to-br from-blue-500 to-blue-600 text-white cursor-pointer">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-4">📄</div>
                    <div class="font-black text-sm">INVOICE</div>
                    <div class="text-[10px] opacity-70 font-medium">Sales & Purchase</div>
                </div>
                
                <div onclick="alert('Vouchers Open')" class="ios-card p-4 bg-gradient-to-br from-green-500 to-green-600 text-white cursor-pointer">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-4">💰</div>
                    <div class="font-black text-sm">VOUCHER</div>
                    <div class="text-[10px] opacity-70 font-medium">Cash Flow</div>
                </div>

                <div onclick="alert('Accounts Open')" class="ios-card p-4 bg-gradient-to-br from-orange-500 to-orange-600 text-white cursor-pointer">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-4">👤</div>
                    <div class="font-black text-sm">ACCOUNTS</div>
                    <div class="text-[10px] opacity-70 font-medium">Party Balance</div>
                </div>

                <div onclick="alert('Reports Open')" class="ios-card p-4 bg-gradient-to-br from-indigo-500 to-indigo-600 text-white cursor-pointer">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mb-4">📊</div>
                    <div class="font-black text-sm">REPORTS</div>
                    <div class="text-[10px] opacity-70 font-medium">Audit History</div>
                </div>
            </div>
        </div>
    `;
}

// App start karein
init();
</script>

</body>
</html>
