<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2Smart ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8F9FB; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div class="app-container">
        <header class="glass-header sticky top-0 z-50 px-6 py-5 flex justify-between items-center border-b border-gray-100">
            <div>
                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md uppercase tracking-tighter">Management System</span>
                <h1 class="text-2xl font-black text-gray-900 leading-none mt-1 tracking-tight">2SMART PVT LIMITED</h1>
            </div>
            <button onclick="App.navigate('config')" class="w-12 h-12 bg-white border border-gray-100 rounded-2xl shadow-sm flex items-center justify-center active:scale-90 transition-transform">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.4[...]
            </button>
        </header>

        <main id="main-content" class="px-6 py-6">
            <div id="view-dashboard" class="fade-in">
                <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-6">Business Operations</p>
                
                <div class="grid grid-cols-2 gap-5">
                    <div onclick="App.navigate('invoice')" class="bg-[#3B82F6] p-6 rounded-[35px] shadow-lg shadow-blue-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5[...]
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">INVOICE</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Sales & Purchase</p>
                    </div>

                    <div onclick="App.navigate('voucher')" class="bg-[#10B981] p-6 rounded-[35px] shadow-lg shadow-green-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .[...]
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">VOUCHER</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Cash Flow</p>
                    </div>

                    <div onclick="App.navigate('accounts')" class="bg-[#F97316] p-6 rounded-[35px] shadow-lg shadow-orange-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H5a2 2 0 00-2[...]
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">ACCOUNTS</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Party Balance</p>
                    </div>

                    <div onclick="App.navigate('reports')" class="bg-[#8B5CF6] p-6 rounded-[35px] shadow-lg shadow-purple-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-[...]
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">REPORTS</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Audit History</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const App = {
            config: {
                company: '2Smart PVT Limited',
                address: '123 Business Avenue, Corporate Park, City - 12345',
                phone: '+91 (800) 123-4567',
                email: 'info@2smart.com'
            },
            navigate(view) {
                const main = document.getElementById('main-content');
                // Hum ek ek karke screens yahan render karenge
                if(view === 'invoice') {
                    main.innerHTML = `<div class="fade-in text-center p-10 font-bold text-gray-400">Loading Invoice Module...</div>`;
                } else if(view === 'config') {
                    main.innerHTML = `
                        <div class="fade-in">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-3xl font-black text-gray-900 tracking-tight">System Config</h2>
                                <button onclick="App.navigate('dashboard')" class="text-blue-600 font-bold">Done</button>
                            </div>

                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-2">Basic Info</p>
                            <div class="bg-white rounded-[25px] p-6 shadow-sm border border-gray-100 mb-8">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Company Name</label>
                                <div class="text-lg font-black text-gray-900 mt-1">${this.config.company}</div>
                            </div>

                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-2">Contact Details</p>
                            <div class="bg-white rounded-[25px] overflow-hidden shadow-sm border border-gray-100">
                                <div class="p-5 border-b border-gray-50">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Office Address</label>
                                    <div class="text-[13px] font-bold text-gray-800 mt-1 leading-tight">${this.config.address}</div>
                                </div>
                                <div class="p-5 border-b border-gray-50">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Phone Number</label>
                                    <div class="text-md font-bold text-gray-800 mt-1">${this.config.phone}</div>
                                </div>
                                <div class="p-5">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Email Address</label>
                                    <div class="text-md font-bold text-gray-800 mt-1 text-blue-600">${this.config.email}</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (view === 'dashboard') {
                    location.reload(); // Temporary for core structure
                } else {
                    main.innerHTML = `<div class="fade-in text-center p-10 font-bold text-gray-400">Working on ${view.toUpperCase()}...</div>`;
                }
            }
        };
    </script>
</body>
</html>
