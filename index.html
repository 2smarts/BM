<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Smart Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; }
        .ios-card { background: white; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 15px; margin-bottom: 15px; }
        input, select { border: 1px solid #ddd; padding: 8px; border-radius: 8px; margin-bottom: 10px; width: 100%; }
        button { cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; font-size: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 1. CORE LOGIC & CLASSES ---
        class AppState {
            constructor() {
                this.companyName = localStorage.getItem("companyName") || "2SMARTS PVT LIMITED";
                this.companyAddress = "Hong Kong Office";
                this.companyPhone = "+852 XXXX XXXX";
                this.companyEmail = "info@2smart.com";
                this.bankName = "HSBC";
                this.bankAccNo = "123-456789-001";
                this.bankSwift = "HSBCHKHH";
                
                const savedAccounts = localStorage.getItem("stored_accounts_data");
                this.accounts = savedAccounts ? JSON.parse(savedAccounts) : [
                    { id: '1', name: 'CASH IN HAND', type: 'Cash' }
                ];

                const savedTxs = localStorage.getItem("stored_transactions_data");
                this.transactions = savedTxs ? JSON.parse(savedTxs) : [];
            }
        }

        // --- 2. COMPONENTS ---

        // PDF Generator Helper
        const renderPDF = (invoice, state) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text(state.companyName, 20, 20);
            doc.setFontSize(10);
            doc.text(state.companyAddress, 20, 30);
            
            doc.autoTable({
                head: [["Description", "Qty", "Rate", "Total"]],
                body: invoice.invoiceItems.map(item => [
                    item.particular, item.units, item.rate.toFixed(2), (item.units * item.rate).toFixed(2)
                ]),
                startY: 50
            });
            doc.text(`Total Due: HKD ${invoice.amount.toFixed(2)}`, 140, doc.lastAutoTable.finalY + 10);
            doc.save(`${invoice.voucherNo}.pdf`);
        };

        function AccountDetail({ account, transactions, onBack }) {
            const entries = transactions
                .filter(tx => tx.debitAccountId === account.id || tx.creditAccountId === account.id)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            let currentBal = 0;
            const rows = entries.map(tx => {
                const isDebit = tx.debitAccountId === account.id;
                currentBal += isDebit ? tx.amount : -tx.amount;
                return { ...tx, isDebit, runningBal: currentBal };
            });

            return (
                <div className="p-4">
                    <button onClick={onBack} className="text-blue-500 mb-4">❮ Back</button>
                    <div className="ios-card bg-blue-600 text-white">
                        <h2 className="text-xl font-bold">{account.name}</h2>
                        <p className="opacity-70">{account.type}</p>
                        <h3 className="text-2xl font-black mt-2">Bal: HKD {currentBal.toFixed(2)}</h3>
                    </div>
                    <div className="ios-card overflow-x-auto">
                        <table>
                            <thead>
                                <tr><th>Date</th><th>Narration</th><th>Amt</th><th>Bal</th></tr>
                            </thead>
                            <tbody>
                                {rows.map(r => (
                                    <tr key={r.id}>
                                        <td>{new Date(r.date).toLocaleDateString()}</td>
                                        <td>{r.voucherNo}</td>
                                        <td className={r.isDebit ? "text-green-600" : "text-red-600"}>{r.amount.toFixed(2)}</td>
                                        <td>{r.runningBal.toFixed(2)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function InvoiceView({ state, onBack }) {
            const [invoiceType, setInvoiceType] = useState("SALE");
            const [date, setDate] = useState(new Date());
            const [invoiceNo, setInvoiceNo] = useState(`INV-${Date.now()}`);
            const [selectedPartyId, setSelectedPartyId] = useState(state.accounts[0]?.id);
            const [items, setItems] = useState([{ id: crypto.randomUUID(), particular: "", units: 0, rate: 0 }]);

            const grandTotal = items.reduce((sum, item) => sum + item.units * item.rate, 0);

            const postInvoice = () => {
                const party = state.accounts.find(a => a.id === selectedPartyId);
                const newTx = {
                    id: crypto.randomUUID(),
                    voucherNo: invoiceNo,
                    date: date.toISOString(),
                    debitAccountId: invoiceType === "SALE" ? party.id : "PURCHASE-ID",
                    creditAccountId: invoiceType === "SALE" ? "SALE-ID" : party.id,
                    debitAccountName: party.name,
                    amount: grandTotal,
                    narration: invoiceType,
                    isInvoice: true,
                    invoiceItems: items
                };
                state.transactions.push(newTx);
                localStorage.setItem("stored_transactions_data", JSON.stringify(state.transactions));
                alert("Posted!");
                onBack();
            };

            return (
                <div className="p-4">
                    <button onClick={onBack} className="text-blue-500 mb-4">❮ Cancel</button>
                    <div className="ios-card">
                        <h2 className="font-bold mb-4">{invoiceType} INVOICE</h2>
                        <select value={selectedPartyId} onChange={e => setSelectedPartyId(e.target.value)}>
                            {state.accounts.map(acc => <option key={acc.id} value={acc.id}>{acc.name}</option>)}
                        </select>
                        <input type="text" value={invoiceNo} onChange={e => setInvoiceNo(e.target.value)} placeholder="Invoice No" />
                    </div>
                    {items.map((item, idx) => (
                        <div key={item.id} className="ios-card flex gap-2">
                            <input className="flex-1" placeholder="Item" onChange={e => {
                                const newItems = [...items]; newItems[idx].particular = e.target.value; setItems(newItems);
                            }} />
                            <input className="w-16" type="number" placeholder="Qty" onChange={e => {
                                const newItems = [...items]; newItems[idx].units = Number(e.target.value); setItems(newItems);
                            }} />
                            <input className="w-20" type="number" placeholder="Rate" onChange={e => {
                                const newItems = [...items]; newItems[idx].rate = Number(e.target.value); setItems(newItems);
                            }} />
                        </div>
                    ))}
                    <button className="w-full p-3 bg-gray-200 rounded-xl mb-4" onClick={() => setItems([...items, { id: crypto.randomUUID(), particular: "", units: 0, rate: 0 }])}>+ Add Item</button>
                    <div className="bg-blue-600 text-white p-4 rounded-xl flex justify-between items-center">
                        <span>Total</span>
                        <span className="text-xl font-bold">{grandTotal.toFixed(2)}</span>
                    </div>
                    <button className="w-full bg-blue-600 text-white p-4 rounded-xl mt-4 font-bold" onClick={postInvoice}>SAVE & POST</button>
                </div>
            );
        }

        function AccountManager({ state, onBack }) {
            const [accounts, setAccounts] = useState(state.accounts);
            const [name, setName] = useState("");

            const addAccount = () => {
                const newAcc = { id: crypto.randomUUID(), name: name.toUpperCase(), type: "Receivable" };
                const updated = [...accounts, newAcc];
                setAccounts(updated);
                state.accounts = updated;
                localStorage.setItem("stored_accounts_data", JSON.stringify(updated));
                setName("");
            };

            return (
                <div className="p-4">
                    <button onClick={onBack} className="text-blue-500 mb-4">❮ Back</button>
                    <div className="ios-card">
                        <input value={name} onChange={e => setName(e.target.value)} placeholder="Account Name" />
                        <button className="w-full bg-orange-500 text-white p-2 rounded" onClick={addAccount}>Add Party</button>
                    </div>
                    <div className="space-y-2">
                        {accounts.map(acc => (
                            <div key={acc.id} className="ios-card flex justify-between">
                                <span>{acc.name}</span>
                                <span className="text-gray-400 text-xs">{acc.type}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const [state] = useState(new AppState());
            const [view, setView] = useState("dashboard");
            const [selectedAcc, setSelectedAcc] = useState(null);

            const DashboardCard = ({ title, desc, color, onClick }) => (
                <div onClick={onClick} className={`p-6 rounded-3xl text-white shadow-lg cursor-pointer active:scale-95 transition-transform`} style={{ background: color }}>
                    <h3 className="font-bold text-lg">{title}</h3>
                    <p className="text-xs opacity-80">{desc}</p>
                </div>
            );

            if (selectedAcc) return <AccountDetail account={selectedAcc} transactions={state.transactions} onBack={() => setSelectedAcc(null)} />;
            if (view === "invoice") return <InvoiceView state={state} onBack={() => setView("dashboard")} />;
            if (view === "accounts") return <AccountManager state={state} onBack={() => setView("dashboard")} />;

            return (
                <div>
                    <header className="p-6">
                        <span className="text-[10px] font-bold text-blue-600">MANAGEMENT SYSTEM</span>
                        <h2 className="text-2xl font-black">{state.companyName}</h2>
                    </header>
                    <div className="grid grid-cols-2 gap-4 p-4">
                        <DashboardCard title="INVOICE" desc="Sales & Purchase" color="#007AFF" onClick={() => setView("invoice")} />
                        <DashboardCard title="VOUCHER" desc="Cash Flow" color="#34C759" onClick={() => setView("dashboard")} />
                        <DashboardCard title="ACCOUNTS" desc="Party Balance" color="#FF9500" onClick={() => setView("accounts")} />
                        <DashboardCard title="REPORTS" desc="Audit History" color="#5856D6" onClick={() => setView("dashboard")} />
                    </div>
                    
                    <div className="p-4">
                        <h4 className="text-gray-400 text-xs font-bold mb-2">RECENT PARTIES</h4>
                        {state.accounts.slice(0, 5).map(acc => (
                            <div key={acc.id} className="ios-card flex justify-between items-center" onClick={() => setSelectedAcc(acc)}>
                                <span>{acc.name}</span>
                                <span className="text-blue-500 font-bold">View Ledger ❯</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
