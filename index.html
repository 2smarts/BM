<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2Smart Pro ERP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F2F2F7; }
        .ios-blur { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .screen { display: none; min-height: 100vh; transition: all 0.3s ease; }
        .active-screen { display: block; }
        /* Lush Gradients from your images */
        .grad-blue { background: linear-gradient(135deg, #007AFF, #00C6FF); }
        .grad-purple { background: linear-gradient(135deg, #5856D6, #AF52DE); }
        .grad-orange { background: linear-gradient(135deg, #FF9500, #FFCC00); }
    </style>
</head>
<body>

    <div id="app">
        
        <header class="sticky top-0 z-50 ios-blur p-4 flex justify-between items-center border-b border-gray-200">
            <div id="header-context">
                <p class="text-[10px] font-black text-blue-600 tracking-widest uppercase">2Smart Pvt Ltd</p>
                <h2 id="view-title" class="text-xl font-black text-gray-900 leading-tight">DASHBOARD</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="App.sync()" class="bg-gray-100 p-2 rounded-xl">🔄</button>
                <button onclick="App.settings()" class="bg-gray-100 p-2 rounded-xl">⚙️</button>
            </div>
        </header>

        <main id="screen-container" class="p-4">
            </main>

    </div>

    <script>
        /**
         * APP STATE ENGINE (Like AppState in SwiftUI)
         * Isme humara sara logic aur data store hoga.
         */
        const App = {
            // Internal Database
            state: {
                user: "Admin",
                transactions: [],
                accounts: [
                    { id: 'R-101', name: 'ASIF AK', type: 'Receivable' },
                    { id: 'P-102', name: 'HONGKONG', type: 'Payable' }
                ],
                currentView: 'dashboard'
            },

            // Initialization
            init() {
                console.log("2Smart System Initialized...");
                this.loadData();
                this.renderDashboard(); // Sabse pehle dashboard dikhao
            },

            // Navigation Logic
            navigate(viewName, title) {
                document.getElementById('view-title').innerText = title.toUpperCase();
                this.state.currentView = viewName;
                // Hum component-based rendering karenge
                this['render' + viewName.charAt(0).toUpperCase() + viewName.slice(1)]();
            },

            // Data Persistence
            saveData() {
                localStorage.setItem('2smart_pro_state', JSON.stringify(this.state));
            },

            loadData() {
                const saved = localStorage.getItem('2smart_pro_state');
                if (saved) this.state = JSON.parse(saved);
            },

            // View Renders (Inhe hum ek ek karke detail mein likhenge)
            renderDashboard() {
                const container = document.getElementById('screen-container');
                container.innerHTML = `
                    <div class="grid grid-cols-2 gap-4 fade-in">
                        <div onclick="App.navigate('invoice', 'Invoicing')" class="grad-blue p-6 rounded-[30px] text-white shadow-lg active:scale-95 transition-all cursor-pointer">
                            <div class="bg-white/20 w-10 h-10 rounded-2xl flex items-center justify-center mb-6">📄</div>
                            <h3 class="font-black text-lg">INVOICE</h3>
                            <p class="text-[10px] opacity-80 uppercase font-bold">Sales & Purchase</p>
                        </div>
                        <div onclick="App.navigate('voucher', 'Vouchers')" class="grad-purple p-6 rounded-[30px] text-white shadow-lg active:scale-95 transition-all cursor-pointer">
                            <div class="bg-white/20 w-10 h-10 rounded-2xl flex items-center justify-center mb-6">💰</div>
                            <h3 class="font-black text-lg">VOUCHER</h3>
                            <p class="text-[10px] opacity-80 uppercase font-bold">Cash Flow</p>
                        </div>
                    </div>
                `;
            },

            renderInvoice() {
    const container = document.getElementById('screen-container');
    const invCount = this.state.transactions.filter(t => t.type === 'SALE' || t.type === 'PURCHASE').length + 1;
    const invNo = `SIN-${String(invCount).padStart(5, '0')}`;

    container.innerHTML = `
        <div class="space-y-6">
            <button onclick="App.navigate('dashboard', 'Dashboard')" class="text-blue-600 font-bold">← Back</button>
            
            <div class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 space-y-5">
                <div class="flex justify-between items-center border-b pb-4">
                    <h2 class="text-xl font-black text-blue-600">${invNo}</h2>
                    <p class="font-bold text-gray-400">${new Date().toLocaleDateString('en-GB')}</p>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Party Name</label>
                    <select id="inv-party-id" class="w-full p-4 bg-gray-50 rounded-2xl font-bold">
                        ${this.state.accounts.map(acc => `<option value="${acc.id}">${acc.name}</option>`).join('')}
                    </select>
                </div>

                <div class="bg-blue-50 p-6 rounded-[28px]">
                    <label class="text-[10px] font-black text-blue-400 uppercase">Amount (HKD)</label>
                    <input type="number" id="inv-amt" placeholder="0.00" class="bg-transparent w-full text-4xl font-black text-blue-600 outline-none">
                </div>

                <button onclick="App.postInvoice('${invNo}')" class="w-full grad-blue text-white font-black py-5 rounded-[24px] shadow-lg">
                    POST INVOICE
                </button>
            </div>
        </div>
    `;
},

// Yeh function bhi paste karein (App object ke andar hi)
postInvoice(invNo) {
    const amt = parseFloat(document.getElementById('inv-amt').value);
    if(!amt) return alert("Amount likho bhai!");

    this.state.transactions.push({
        id: invNo,
        partyId: document.getElementById('inv-party-id').value,
        amount: amt,
        type: 'SALE',
        date: '25 Apr'
    });
    this.saveData();
    this.navigate('dashboard', 'Dashboard');
}
        };

        // Start the Engine
        window.onload = () => App.init();
    </script>
</body>
</html>
