<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2Smart ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8F9FB; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div class="app-container">
        <header class="glass-header sticky top-0 z-50 px-6 py-5 flex justify-between items-center border-b border-gray-100">
            <div>
                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md uppercase tracking-tighter">Management System</span>
                <h1 class="text-2xl font-black text-gray-900 leading-none mt-1 tracking-tight">2SMART PVT LIMITED</h1>
            </div>
            <button onclick="App.navigate('config')" class="w-12 h-12 bg-white border border-gray-100 rounded-2xl shadow-sm flex items-center justify-center active:scale-90 transition-transform">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </header>

        <main id="main-content" class="px-6 py-6">
            <div id="view-dashboard" class="fade-in">
                <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-6">Business Operations</p>
                
                <div class="grid grid-cols-2 gap-5">
                    <div onclick="App.navigate('invoice')" class="bg-[#3B82F6] p-6 rounded-[35px] shadow-lg shadow-blue-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">INVOICE</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Sales & Purchase</p>
                    </div>

                    <div onclick="App.navigate('voucher')" class="bg-[#10B981] p-6 rounded-[35px] shadow-lg shadow-green-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">VOUCHER</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Cash Flow</p>
                    </div>

                    <div onclick="App.navigate('accounts')" class="bg-[#F97316] p-6 rounded-[35px] shadow-lg shadow-orange-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path></svg>
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">ACCOUNTS</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Party Balance</p>
                    </div>

                    <div onclick="App.navigate('reports')" class="bg-[#8B5CF6] p-6 rounded-[35px] shadow-lg shadow-purple-100 active:scale-95 transition-all cursor-pointer">
                        <div class="bg-white/20 w-11 h-11 rounded-2xl flex items-center justify-center mb-10 text-white shadow-inner">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        </div>
                        <h2 class="text-white font-black text-xl leading-tight">REPORTS</h2>
                        <p class="text-white/70 text-[10px] font-bold uppercase tracking-tighter">Audit History</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const App = {
            navigate(view) {
                const main = document.getElementById('main-content');
                // Hum ek ek karke screens yahan render karenge
                if(view === 'invoice') {
                    main.innerHTML = `<div class="fade-in text-center p-10 font-bold text-gray-400">Loading Invoice Module...</div>`;
                } else if (view === 'dashboard') {
                    location.reload(); // Temporary for core structure
                } else {
                    main.innerHTML = `<div class="fade-in text-center p-10 font-bold text-gray-400">Working on ${view.toUpperCase()}...</div>`;
                }
            }
        };
    </script>
</body>
</html>
